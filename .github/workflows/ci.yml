name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        # Run backend/frontend separately for coverage
        component: [backend, frontend]
      fail-fast: false
      
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'
    
    - name: Cache node_modules
      id: cache-node-modules
      uses: actions/cache@v4
      with:
        path: |
          backend/node_modules
          frontend/node_modules
        key: ${{ runner.os }}-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
    
    - name: Install backend deps
      if: matrix.component == 'backend'
      run: |
        cd backend
        npm ci
    
    - name: Install frontend deps  
      if: matrix.component == 'frontend'
      run: |
        cd frontend
        npm ci
    
    - name: Run backend tests
      if: matrix.component == 'backend'
      run: |
        cd backend
        npm test -- --coverage --coverageReporters=lcov --coverageDirectory=../coverage/backend
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
        # Disable Stellar network calls for tests
        STELLAR_NETWORK: mock
    
    - name: Run frontend tests
      if: matrix.component == 'frontend'
      run: |
        cd frontend
        npm test -- --coverage --watchAll=false --coverageReporters=lcov --coverageDirectory=../coverage/frontend
    
    - name: Coverage report
      if: always()
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage/backend/lcov.info,./coverage/frontend/lcov.info
        fail_ci_if_error: true
    
    - name: Upload coverage
      uses: actions/upload-artifact@v4
      if: matrix.node-version == '20.x' && success()
      with:
        name: coverage-report-${{ matrix.component }}
        path: coverage/

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    # Only run E2E tests on PRs to main to save CI resources
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cbpa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'
    
    - name: Install backend dependencies
      run: |
        cd backend
        npm ci
    
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Install E2E dependencies
      run: |
        cd e2e
        npm ci
        npx playwright install --with-deps
    
    - name: Setup test database
      run: |
        cd backend
        npm run migrate
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cbpa_test
    
    - name: Build frontend for E2E
      run: |
        cd frontend
        npm run build
      env:
        REACT_APP_API_URL: http://localhost:5000
        REACT_APP_STELLAR_NETWORK: testnet
    
    - name: Run E2E tests
      run: |
        cd e2e
        npm run test:e2e
      env:
        E2E_BASE_URL: http://localhost:3000
        E2E_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cbpa_test
        E2E_REDIS_URL: redis://localhost:6379/1
        CI: true
    
    - name: Upload E2E test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-test-results
        path: |
          e2e/test-results/
          e2e/playwright-report/
        retention-days: 7
    
    - name: Upload E2E screenshots
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: e2e-screenshots
        path: e2e/test-results/screenshots/
        retention-days: 7
